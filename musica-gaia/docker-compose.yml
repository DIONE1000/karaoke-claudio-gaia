version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: musicagaia_db
    restart: always
    # O arquivo .env na raiz agora preenche estas variáveis automaticamente
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: musicagaia_backend
    restart: always
    # Comando para rodar migrations e ligar o servidor
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env # <--- AJUSTADO: Agora aponta para a raiz
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: musicagaia_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  mysql_data:
  frontend_node_modules:
